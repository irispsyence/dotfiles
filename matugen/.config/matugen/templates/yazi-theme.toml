# Matugen generated yazi theme
# Input:  ~/.config/matugen/templates/yazi-theme.toml
# Output: ~/.config/yazi/theme.toml

[flavor]
dark  = ""
light = ""

[app]
overall = { bg = "#{{colors.background.default.hex_stripped}}" }

[mgr]
cwd            = { fg = "#{{colors.primary.default.hex_stripped}}" }
border_style   = { fg = "#{{colors.surface_variant.default.hex_stripped}}" }
symlink_target = { fg = "#{{colors.secondary.default.hex_stripped}}", italic = true }

marker_selected = { fg = "#{{colors.primary.default.hex_stripped}}" }
marker_copied   = { fg = "#{{colors.secondary.default.hex_stripped}}" }
marker_cut      = { fg = "#ff4444" }

count_selected = { fg = "#{{colors.primary.default.hex_stripped}}", bold = true }
count_copied   = { fg = "#{{colors.secondary.default.hex_stripped}}", bold = true }
count_cut      = { fg = "#ff4444", bold = true }

[status]
overall         = { bg = "#{{colors.background.default.hex_stripped}}", fg = "#{{colors.on_surface.default.hex_stripped}}" }
perm_sep        = { fg = "#{{colors.surface_variant.default.hex_stripped}}" }
perm_type       = { fg = "#{{colors.primary.default.hex_stripped}}" }
perm_read       = { fg = "#{{colors.secondary.default.hex_stripped}}" }
perm_write      = { fg = "#ff4444" }
perm_exec       = { fg = "#{{colors.tertiary.default.hex_stripped}}" }
progress_label  = { fg = "#{{colors.on_background.default.hex_stripped}}", bold = true }
progress_normal = { fg = "#{{colors.primary.default.hex_stripped}}", bg = "#{{colors.background.default.hex_stripped}}" }
progress_error  = { fg = "#ff4444", bg = "#{{colors.background.default.hex_stripped}}" }

[mode]
normal_main = { fg = "#{{colors.background.default.hex_stripped}}", bg = "#{{colors.primary.default.hex_stripped}}", bold = true }
normal_alt  = { fg = "#{{colors.primary.default.hex_stripped}}",    bg = "#{{colors.background.default.hex_stripped}}" }
select_main = { fg = "#{{colors.background.default.hex_stripped}}", bg = "#{{colors.secondary.default.hex_stripped}}", bold = true }
select_alt  = { fg = "#{{colors.secondary.default.hex_stripped}}",  bg = "#{{colors.background.default.hex_stripped}}" }
unset_main  = { fg = "#{{colors.background.default.hex_stripped}}", bg = "#{{colors.tertiary.default.hex_stripped}}", bold = true }
unset_alt   = { fg = "#{{colors.tertiary.default.hex_stripped}}",   bg = "#{{colors.background.default.hex_stripped}}" }

[indicator]
parent  = { fg = "#{{colors.surface_variant.default.hex_stripped}}", bg = "#{{colors.background.default.hex_stripped}}" }
current = { fg = "#{{colors.on_background.default.hex_stripped}}",   bg = "#{{colors.background.default.hex_stripped}}" }
preview = { fg = "#{{colors.surface_variant.default.hex_stripped}}", bg = "#{{colors.background.default.hex_stripped}}" }

[tabs]
active   = { fg = "#{{colors.primary.default.hex_stripped}}", bold = true }
inactive = { fg = "#{{colors.surface_variant.default.hex_stripped}}" }

[input]
border   = { fg = "#{{colors.primary.default.hex_stripped}}" }
title    = { fg = "#{{colors.on_surface.default.hex_stripped}}" }
value    = { fg = "#{{colors.on_background.default.hex_stripped}}" }
selected = { reversed = true }

[pick]
border   = { fg = "#{{colors.primary.default.hex_stripped}}" }
active   = { fg = "#{{colors.primary.default.hex_stripped}}" }
inactive = { fg = "#{{colors.surface_variant.default.hex_stripped}}" }

[which]
mask            = { bg = "#{{colors.background.default.hex_stripped}}" }
cand            = { fg = "#{{colors.primary.default.hex_stripped}}" }
rest            = { fg = "#{{colors.surface_variant.default.hex_stripped}}" }
desc            = { fg = "#{{colors.on_surface.default.hex_stripped}}" }
separator       = "  "
separator_style = { fg = "#{{colors.surface_variant.default.hex_stripped}}" }

[notify]
title_info  = { fg = "#{{colors.primary.default.hex_stripped}}" }
title_warn  = { fg = "#ffaa00" }
title_error = { fg = "#ff4444" }
icon_info   = ""
icon_warn   = ""
icon_error  = ""

[confirm]
border  = { fg = "#{{colors.primary.default.hex_stripped}}" }
title   = { fg = "#{{colors.on_surface.default.hex_stripped}}" }
body    = { fg = "#{{colors.on_background.default.hex_stripped}}" }
btn_yes = { fg = "#{{colors.background.default.hex_stripped}}", bg = "#{{colors.primary.default.hex_stripped}}", bold = true }
btn_no  = { fg = "#{{colors.on_surface.default.hex_stripped}}" }

[spot]
border = { fg = "#{{colors.primary.default.hex_stripped}}" }
title  = { fg = "#{{colors.on_surface.default.hex_stripped}}" }

[tasks]
border  = { fg = "#{{colors.primary.default.hex_stripped}}" }
title   = { fg = "#{{colors.on_surface.default.hex_stripped}}" }
hovered = { fg = "#{{colors.primary.default.hex_stripped}}", bold = true }

[help]
on      = { fg = "#{{colors.primary.default.hex_stripped}}" }
run     = { fg = "#{{colors.secondary.default.hex_stripped}}" }
desc    = { fg = "#{{colors.on_surface.default.hex_stripped}}" }
hovered = { fg = "#{{colors.primary.default.hex_stripped}}", reversed = true }
footer  = { fg = "#{{colors.on_background.default.hex_stripped}}", bg = "#{{colors.background.default.hex_stripped}}" }

[filetype]
rules = [
  { mime = "image/*",               fg = "#{{colors.tertiary.default.hex_stripped}}" },
  { mime = "video/*",               fg = "#{{colors.secondary.default.hex_stripped}}" },
  { mime = "audio/*",               fg = "#{{colors.secondary.default.hex_stripped}}" },
  { mime = "application/zip",       fg = "#{{colors.primary.default.hex_stripped}}" },
  { mime = "application/x-tar",     fg = "#{{colors.primary.default.hex_stripped}}" },
  { mime = "application/pdf",       fg = "#ff4444" },
  { mime = "text/*",                fg = "#{{colors.on_surface.default.hex_stripped}}" },
  { mime = "application/json",      fg = "#{{colors.secondary.default.hex_stripped}}" },
  { mime = "application/x-executable", fg = "#{{colors.primary.default.hex_stripped}}", bold = true },
  { mime = "inode/directory",       fg = "#{{colors.primary.default.hex_stripped}}" },
]
