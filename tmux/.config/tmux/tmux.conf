# Set prefix to Ctrl+Space (or keep Ctrl+b if you prefer)
set -g prefix C-Space
bind C-Space send-prefix
#Set status bar to top
set -g status-position top

set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Wayland clipboard
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
set -g set-clipboard on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

unbind -T root WheelUpPane
unbind -T root WheelDownPane

# Vim keybinds for navigation
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with more intuitive keys
bind v split-window -h
bind s split-window -v

# Source colors
source-file ~/.config/tmux/colors.conf

# ── Splits with current path ──────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── Zoom toggle ───────────────────────────────────────────────────────────────
bind z resize-pane -Z

# ── Session navigation ────────────────────────────────────────────────────────
bind -r ( switch-client -p
bind -r ) switch-client -n

# ── Sessionizer ───────────────────────────────────────────────────────────────
bind f display-popup -E -w 60% -h 40% ~/.local/bin/tmux-sessionizer

# ── Misc ──────────────────────────────────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 10000
set -g focus-events on
set -g mouse on
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

bind y run-shell "
  PANE_COUNT=\$(tmux list-panes | wc -l)
  if [ \$PANE_COUNT -ge 3 ]; then
    tmux kill-pane -t '{top-left}'
  else
    tmux split-window -hb -l 30% -c '#{pane_current_path}'
    tmux send-keys 'yazi' Enter
  fi
"
